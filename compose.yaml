services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitcheck
      POSTGRES_USER: fitcheck
      POSTGRES_PASSWORD: fitcheck
    ports:
      - "5432:5432"
    volumes:
      - fit_check_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitcheck -d fitcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fit_check_postgres:
